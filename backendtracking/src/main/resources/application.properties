# APLICACION
spring.application.name=tracking-apollo

# SERVIDOR
server.port=5002
server.servlet.application-display-name=Tracking Delivery Microservice

# BASE DE DATOS - CORREGIDO PARA DOCKER
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB:luren_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# URLs de otros servicios
frontend.url=${FRONTEND_URL:http://localhost}
sistema.backend.url=${SISTEMA_BACKEND_URL:http://backend-apollo:8080}

# Google Maps API Key
google.maps.api.key=${GOOGLE_MAPS_KEY:}

# Coordenadas del local Apollo - La Mar 1141, Ica
local.latitud=-14.070505106029492
local.longitud=-75.72412960638542

# LOGGING
logging.level.tracking.apollo=DEBUG
logging.level.org.springframework.web=INFO

# ACTUATOR
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true

# Configurar zona horaria para JPA/Hibernate
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jpa.properties.hibernate.timezone.default-storage=NORMALIZE

# Configurar zona horaria para Jackson (JSON)
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX