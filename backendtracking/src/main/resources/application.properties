# ── APLICACIÓN ─────────────────────────────────────────────────────────────────
spring.application.name=tracking-apollo

# ── SERVIDOR ───────────────────────────────────────────────────────────────────
server.port=8082
server.servlet.application-display-name=Tracking Delivery Microservice

# ── BASE DE DATOS (misma PostgreSQL, esquema compartido) ───────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/luren_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - solo update para no romper tablas existentes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── URLs de otros servicios ────────────────────────────────────────────────────
frontend.url=http://localhost:4200
sistema.backend.url=http://localhost:8080

# ── Google Maps API Key ───────────────────────
google.maps.api.key=${GOOGLE_MAPS_KEY:}

# ── Coordenadas del local Apollo - La Mar 1141, Ica ───────────────────────────
local.latitud=-14.070505106029492
local.longitud=-75.72412960638542

# ── LOGGING ────────────────────────────────────────────────────────────────────
logging.level.tracking.apollo=DEBUG
logging.level.org.springframework.web=INFO

# ── ACTUATOR ───────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true