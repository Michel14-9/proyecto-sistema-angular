spring.application.name=chatbot-service

# Puerto del chatbot
server.port=5003

# URL del backend principal (sistema-apollo)
backend.url=http://backend-apollo:8080

# URL del frontend
frontend.url=http://frontend

# ============================================
# CONFIGURACION DE GROQ API
# ============================================
groq.api.key=${GROQ_API_KEY:}

# ============================================
# CONFIGURACION DE WHATSAPP
# ============================================
whatsapp.api.url=https://graph.facebook.com/v19.0
whatsapp.phone.number.id=${WHATSAPP_PHONE_ID}
whatsapp.token=${WHATSAPP_TOKEN}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}

# ============================================
# LOGGING
# ============================================
logging.level.com.chatbot=DEBUG
logging.level.org.springframework.web=INFO