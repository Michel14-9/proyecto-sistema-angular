spring.application.name=chatbot-service

# Puerto del chatbot - DIFERENTE al backend principal
server.port=8083

# URL del backend principal (sistema-apollo)
backend.url=http://localhost:8080

# URL del frontend (si lo necesitas)
frontend.url=http://localhost:4200

# ============================================
# CONFIGURACIÓN DE GROQ API
# ============================================

# La API Key se obtiene del archivo .env
groq.api.key=${GROQ_API_KEY}