services:
  # 1. BASE DE DATOS
  postgres:
    image: postgres:15-alpine
    container_name: apollo_postgres
    environment:
      TZ: America/Lima
      PGTZ: America/Lima
      POSTGRES_DB: luren_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apollo_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. BACKEND PRINCIPAL
  backend-apollo:
    build: ./backend
    container_name: apollo_backend
    environment:
      TZ: America/Lima
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: luren_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_API_URL: http://mercadopago:5001
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://backend-apollo:8080
      CHATBOT_URL: http://chatbot:5003
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apollo_network
    restart: unless-stopped

  # 3. BACKEND PYTHON
  backend-python:
    build: ./backend-python
    container_name: apollo_python
    environment:
      TZ: America/Lima
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: luren_db
      FLASK_APP: app.py
      FLASK_ENV: production
      JAVA_BACKEND_URL: http://backend-apollo:8080
      JAVA_USERNAME: ${JAVA_USERNAME}
      JAVA_PASSWORD: ${JAVA_PASSWORD}
      PYTHON_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apollo_network
    restart: unless-stopped

  # 4. MERCADO PAGO
  mercadopago:
    build: ./backendmercadopago
    container_name: apollo_mercadopago
    environment:
      TZ: America/Lima
      MERCADOPAGO_PUBLIC_KEY: ${MERCADOPAGO_PUBLIC_KEY}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      FRONTEND_URL: http://localhost
      MERCADOPAGO_API_URL: ${MERCADOPAGO_NGROK_URL}
      SISTEMA_BACKEND_URL: http://backend-apollo:8080
    ports:
      - "5001:5001"
    networks:
      - apollo_network
    restart: unless-stopped

  # 5. TRACKING
  tracking:
    build: ./backendtracking
    container_name: apollo_tracking
    environment:
      TZ: America/Lima
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: luren_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apollo_network
    restart: unless-stopped

  # 6. CHATBOT
  chatbot:
    build: ./chatbot-service
    container_name: apollo_chatbot
    environment:
      TZ: America/Lima
      GROQ_API_KEY: ${GROQ_API_KEY}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
    ports:
      - "5003:5003"
    networks:
      - apollo_network
    restart: unless-stopped

  # 7. FRONTEND ANGULAR
  frontend:
    build: ./frontend
    container_name: apollo_frontend
    environment:
      TZ: America/Lima
    ports:
      - "80:80"
    depends_on:
      - backend-apollo
    networks:
      - apollo_network
    restart: unless-stopped

networks:
  apollo_network:
    driver: bridge

volumes:
  postgres_data: