<div class="row mb-4">
  <div class="col-md-3">
    <div class="card stat-card text-warning">
      <i class="bi bi-clock-history"></i>
      <div class="number">{{ metricas.totalPorPreparar }}</div>
      <div class="label">Por Preparar</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card text-primary">
      <i class="bi bi-egg-fried"></i>
      <div class="number">{{ metricas.totalEnPreparacion }}</div>
      <div class="label">En Preparación</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card text-success">
      <i class="bi bi-check-circle"></i>
      <div class="number">{{ metricas.totalListosHoy }}</div>
      <div class="label">Listos Hoy</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card text-info">
      <i class="bi bi-speedometer2"></i>
      <div class="number">{{ metricas.tiempoPromedio }}min</div>
      <div class="label">Tiempo Promedio</div>
    </div>
  </div>
</div>
